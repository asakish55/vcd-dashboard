# ─────────────────────────────────────────────────────────────────────────────
# VCD Dashboard – docker-compose.yml (Production)
#
# Usage:
#   docker compose up -d           # Start in background
#   docker compose logs -f         # View logs
#   docker compose down            # Stop
#   docker compose build --no-cache  # Rebuild images
#
# Access dashboard at: http://<server-ip>
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend – FastAPI ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vcd-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    networks:
      - vcd-net
    # Do NOT expose 8000 to host in production (nginx proxies internally)
    # Uncomment below only for debugging:
    # ports:
    #   - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend – Nginx + React ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vcd-frontend
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP – change to "443:443" for HTTPS
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vcd-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  vcd-net:
    driver: bridge
